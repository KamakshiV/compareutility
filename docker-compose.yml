services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: compare
      POSTGRES_PASSWORD: compare
      POSTGRES_DB: reconiq
    ports:
      # Use 5433 on the host so local PostgreSQL on 5432 does not steal connections
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
